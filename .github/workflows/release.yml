name: Build and publish

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest        # Linux x86_64
          - ubuntu-24.04-arm     # Linux ARM64
          - windows-latest       # Windows x86_64
          - windows-11-arm       # Windows ARM64
          - macos-15-intel       # macOS Intel x86_64
          - macos-latest         # macOS Apple Silicon ARM64

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.4.1

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_pyodide:
    name: Build Pyodide wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.4.1

      - name: Build Pyodide wheels
        run: python -m cibuildwheel --platform pyodide --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp312-* cp313-*"

      - uses: actions/upload-artifact@v6
        with:
          name: pyodide-wheels
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz

  collect:
    name: Collect all distributions
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.build_sdist.result == 'success' }}

    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v6
        with:
          name: sdist
          path: dist

      - uses: actions/download-artifact@v6
        with:
          name: pyodide-wheels
          path: dist/pyodide

      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [collect, build_sdist]
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name == 'release' && needs.build_sdist.result == 'success' && needs.collect.result == 'success' }}
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1